<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <title>Oktober plan</title>
  <style>
    body { font-family: Arial; max-width: 600px; margin: 40px auto; }
    .row { display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #eee; }
  </style>
</head>
<body>

<h1>Hvornår kan du i oktober?</h1>

<input id="name" placeholder="Skriv navn" />
<button onclick="submit()">Tilføj</button>

<div id="list"></div>

<script>
const API = "INDSÆT_DIN_APPS_SCRIPT_URL_HER";

async function load() {
  const res = await fetch(API);
  const data = await res.json();

  document.getElementById("list").innerHTML =
    data.map(p => `
      <div class="row">
        <div>${p.name}</div>
        <div>
          ${p.w2 ? "Uge 2 ✅" : "Uge 2 ⬜"}
          ${p.w3 ? "Uge 3 ✅" : "Uge 3 ⬜"}
          ${p.w4 ? "Uge 4 ✅" : "Uge 4 ⬜"}
        </div>
      </div>
    `).join("");
}

async function submit() {
  const name = document.getElementById("name").value;

  await fetch(API, {
    method: "POST",
    body: JSON.stringify({
      name,
      w2: false,
      w3: false,
      w4: false
    })
  });

  load();
}

load();
</script>

</body>
</html>
