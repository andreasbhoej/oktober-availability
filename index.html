<input id="name" placeholder="Navn" />

<label>
  <input type="checkbox" id="w2"> Uge 2
</label>

<label>
  <input type="checkbox" id="w3"> Uge 3
</label>

<label>
  <input type="checkbox" id="w4"> Uge 4
</label>

<button onclick="submit()">Tilføj</button>

<div id="list"></div>

<script>
const API = "https://script.google.com/macros/s/AKfycbye9nK43UVd1md0d2chOW0sqJr9Dq9-FqvbG489Fozv7EkQPY9fTJeJvT1I09cBVkWw/exec";

async function load() {
  const res = await fetch(API);
  const data = await res.json();

  document.getElementById("list").innerHTML =
    data.map(p => `
      <div>
        <b>${p.name}</b> —
        Uge2: ${p.w2 ? "✅" : "⬜"} |
        Uge3: ${p.w3 ? "✅" : "⬜"} |
        Uge4: ${p.w4 ? "✅" : "⬜"}
      </div>
    `).join("");
}

async function submit() {
  const name = document.getElementById("name").value;

  const body = {
    name,
    w2: document.getElementById("w2").checked,
    w3: document.getElementById("w3").checked,
    w4: document.getElementById("w4").checked
  };

  await fetch(API, {
    method: "POST",
    body: JSON.stringify(body)
  });

  load();
}

load();
</script>
