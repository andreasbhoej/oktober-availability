<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8" />
<title>Apache Band Tour Planner</title>

<style>
  body {
    margin: 0;
    padding: 40px;
    font-family: Arial, sans-serif;
    background: linear-gradient(180deg, #1b120b, #0b0705);
    color: #f2d3a0;
  }

  .container {
    max-width: 700px;
    margin: auto;
    background: rgba(20, 12, 8, 0.92);
    border: 1px solid #b87a3b;
    border-radius: 14px;
    padding: 25px;
    box-shadow: 0 0 35px rgba(184,122,59,0.2);
  }

  h1 {
    margin-top: 0;
    font-size: 28px;
    color: #ffd3a1;
    letter-spacing: 1px;
  }

  .subtitle {
    color: #c48a4a;
    margin-bottom: 20px;
    font-style: italic;
  }

  input[type="text"] {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #b87a3b;
    background: #120b07;
    color: #ffd3a1;
    margin-bottom: 15px;
  }

  .weeks {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 15px;
  }

  .week {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px;
    border-radius: 10px;
    background: rgba(184,122,59,0.08);
    border: 1px solid rgba(184,122,59,0.35);
  }

  button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(90deg, #b87a3b, #8b4f1d);
    color: #120b07;
    font-weight: bold;
    cursor: pointer;
    letter-spacing: 1px;
  }

  button:hover {
    filter: brightness(1.1);
  }

  .entry {
    padding: 12px;
    border-bottom: 1px solid rgba(184,122,59,0.25);
  }

  .tag {
    font-size: 12px;
    color: #c48a4a;
  }

  .header {
    display: flex;
    align-items: center;
    gap: 8px;
  }
</style>

</head>
<body>

<div class="container">

<h1>🎸 Apache Band — Tour Availability</h1>
<div class="subtitle">“No road is too long for the band.”</div>

<input id="name" type="text" placeholder="Band member / crew name..." />

<div class="weeks">

  <label class="week">
    <input type="checkbox" id="w42">
    Uge 42 — Desert Rehearsal
  </label>

  <label class="week">
    <input type="checkbox" id="w43">
    Uge 43 — Road Gig Run
  </label>

  <label class="week">
    <input type="checkbox" id="w44">
    Uge 44 — Final Showdown
  </label>

</div>

<button onclick="submit()">Add to tour roster</button>

<hr style="margin:20px 0; border-color:#b87a3b33">

<div id="list"></div>

</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbye9nK43UVd1md0d2chOW0sqJr9Dq9-FqvbG489Fozv7EkQPY9fTJeJvT1I09cBVkWw/exec";

async function load() {
  const res = await fetch(API);
  const data = await res.json();

  document.getElementById("list").innerHTML =
    data.map(p => `
      <div class="entry">
        <b>${p.name}</b><br>
        <span class="tag">
          U42: ${p.w42 ? "✔ on tour" : "—"} |
          U43: ${p.w43 ? "✔ on tour" : "—"} |
          U44: ${p.w44 ? "✔ on tour" : "—"}
        </span>
      </div>
    `).join("");
}

async function submit() {
  const body = {
    name: document.getElementById("name").value,
    w42: document.getElementById("w42").checked,
    w43: document.getElementById("w43").checked,
    w44: document.getElementById("w44").checked
  };

  await fetch(API, {
    method: "POST",
    body: JSON.stringify(body)
  });

  document.getElementById("name").value = "";
  load();
}

load();
</script>

</body>
</html>
