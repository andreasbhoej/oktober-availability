<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8" />
<title>Oktober plan</title>

<style>
  body {
    font-family: Arial, sans-serif;
    background: #f6f7fb;
    margin: 0;
    padding: 40px;
  }

  .container {
    max-width: 650px;
    margin: auto;
    background: white;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
  }

  h1 { margin-top: 0; }

  input[type="text"] {
    width: 100%;
    padding: 10px;
    margin-bottom: 15px;
    border-radius: 8px;
    border: 1px solid #ddd;
  }

  .weeks {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 15px;
  }

  .week {
    display: flex;
    align-items: center;
    gap: 10px;
    background: #f3f4f6;
    padding: 10px;
    border-radius: 8px;
  }

  button {
    width: 100%;
    padding: 10px;
    border: none;
    border-radius: 8px;
    background: #4f46e5;
    color: white;
    font-weight: bold;
    cursor: pointer;
  }

  button:hover {
    background: #4338ca;
  }

  .entry {
    padding: 10px;
    border-bottom: 1px solid #eee;
  }
</style>

</head>
<body>

<div class="container">

<h1>Hvornår kan du?</h1>
<p>Vælg hvilke uger i oktober du kan</p>

<input id="name" type="text" placeholder="Dit navn..." />

<div class="weeks">
  <label class="week">
    <input type="checkbox" id="w42">
    Uge 42 i oktober
  </label>

  <label class="week">
    <input type="checkbox" id="w43">
    Uge 43 i oktober
  </label>

  <label class="week">
    <input type="checkbox" id="w44">
    Uge 44 i oktober
  </label>
</div>

<button onclick="submit()">Tilføj svar</button>

<hr style="margin:20px 0">

<div id="list"></div>

</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbye9nK43UVd1md0d2chOW0sqJr9Dq9-FqvbG489Fozv7EkQPY9fTJeJvT1I09cBVkWw/exec";

async function load() {
  const res = await fetch(API);
  const data = await res.json();

  document.getElementById("list").innerHTML =
    data.map(p => `
      <div class="entry">
        <b>${p.name}</b><br>
        Uge 42: ${p.w42 ? "✅" : "⬜"} |
        Uge 43: ${p.w43 ? "✅" : "⬜"} |
        Uge 44: ${p.w44 ? "✅" : "⬜"}
      </div>
    `).join("");
}

async function submit() {
  const body = {
    name: document.getElementById("name").value,
    w42: document.getElementById("w42").checked,
    w43: document.getElementById("w43").checked,
    w44: document.getElementById("w44").checked
  };

  await fetch(API, {
    method: "POST",
    body: JSON.stringify(body)
  });

  document.getElementById("name").value = "";
  load();
}

load();
</script>

</body>
</html>
