<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8" />
<title>Dune Summerhouse Tournament</title>

<style>
  body {
    margin: 0;
    padding: 40px;
    font-family: Arial, sans-serif;
    background: radial-gradient(circle at top, #1b1b1b, #0b0b0b);
    color: #e7d3a1;
  }

  .container {
    max-width: 700px;
    margin: auto;
    background: rgba(20, 18, 15, 0.9);
    border: 1px solid #c2a46a;
    border-radius: 14px;
    padding: 25px;
    box-shadow: 0 0 40px rgba(194,164,106,0.15);
  }

  h1 {
    margin-top: 0;
    font-size: 28px;
    letter-spacing: 1px;
    color: #f3e2b3;
  }

  .subtitle {
    color: #c2a46a;
    margin-bottom: 20px;
  }

  input[type="text"] {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #c2a46a;
    background: #0f0e0c;
    color: #f3e2b3;
    margin-bottom: 15px;
  }

  .weeks {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 15px;
  }

  .week {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px;
    border-radius: 10px;
    background: rgba(194,164,106,0.08);
    border: 1px solid rgba(194,164,106,0.3);
  }

  button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(90deg, #c2a46a, #8a6b2d);
    color: #0b0b0b;
    font-weight: bold;
    cursor: pointer;
    letter-spacing: 1px;
  }

  button:hover {
    filter: brightness(1.1);
  }

  .entry {
    padding: 12px;
    border-bottom: 1px solid rgba(194,164,106,0.2);
  }

  .entry b {
    color: #f3e2b3;
  }

  .tag {
    font-size: 12px;
    color: #c2a46a;
  }
</style>

</head>
<body>

<div class="container">

<h1>🏜️ Dune Tournament — Summerhouse Trial</h1>
<div class="subtitle">“The spice must be scheduled.”</div>

<input id="name" type="text" placeholder="Navn på kriger..." />

<div class="weeks">

  <label class="week">
    <input type="checkbox" id="w42">
    Uge 42 — Arrakis Awakening
  </label>

  <label class="week">
    <input type="checkbox" id="w43">
    Uge 43 — Spice Rising
  </label>

  <label class="week">
    <input type="checkbox" id="w44">
    Uge 44 — The Final Sandstorm
  </label>

</div>

<button onclick="submit()">Register participation</button>

<hr style="margin:20px 0; border-color:#c2a46a33">

<div id="list"></div>

</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbye9nK43UVd1md0d2chOW0sqJr9Dq9-FqvbG489Fozv7EkQPY9fTJeJvT1I09cBVkWw/exec";

async function load() {
  const res = await fetch(API);
  const data = await res.json();

  document.getElementById("list").innerHTML =
    data.map(p => `
      <div class="entry">
        <b>${p.name}</b><br>
        <span class="tag">
          U42: ${p.w42 ? "✔ spice ready" : "—"} |
          U43: ${p.w43 ? "✔ spice ready" : "—"} |
          U44: ${p.w44 ? "✔ spice ready" : "—"}
        </span>
      </div>
    `).join("");
}

async function submit() {
  const body = {
    name: document.getElementById("name").value,
    w42: document.getElementById("w42").checked,
    w43: document.getElementById("w43").checked,
    w44: document.getElementById("w44").checked
  };

  await fetch(API, {
    method: "POST",
    body: JSON.stringify(body)
  });

  document.getElementById("name").value = "";
  load();
}

load();
</script>

</body>
</html>
